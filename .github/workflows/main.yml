name: Weekly Breakout Scanner

on:
  schedule:
    # ── NSE market hours: 9:15 AM – 3:30 PM IST (UTC = IST − 5:30)
    # Every 3 hours during market hours, on weekdays only
    #
    # 09:15 AM IST = 03:45 UTC  → market open scan
    - cron: "45 3 * * 1-5"
    # 12:15 PM IST = 06:45 UTC  → midday scan (+3 h)
    - cron: "45 6 * * 1-5"
    # 03:15 PM IST = 09:45 UTC  → pre-close scan (+3 h)
    - cron: "45 9 * * 1-5"
    # 03:30 PM IST = 10:00 UTC  → market close EOD scan
    - cron: "0 10 * * 1-5"

  # Allow manual trigger from the Actions tab
  workflow_dispatch: {}

concurrency:
  group: weekly-breakout-scanner
  cancel-in-progress: true   # cancel the old run if a new hour fires before it finishes

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 55      # 1-hour scans may take up to ~50 min for 500 tickers

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scanner.py \
            --watchlist watchlist.txt \
            --market-hours-only \
            --no-charts \
            --notify

      - name: Upload results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: breakout-results-${{ github.run_id }}
          path: output/
          retention-days: 14
